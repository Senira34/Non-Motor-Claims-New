<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Acknowledgment — Insurance Claims Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 600: '#00ADBB', 700: '#008A9A', 50: '#f0fdfa' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Toggle Switch Styles */
    .toggle-checkbox:checked {
      right: 0;
      border-color: #00ADBB;
    }

    .toggle-checkbox:checked+.toggle-label {
      background-color: #00ADBB;
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen pb-20">
  <!-- NAVBAR -->
  <div id="navbar-container"></div>
  <script src="navbar-component.js"></script>

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>
  <script src="sidebar-component.js"></script>

  <main class="ml-64 pt-16 min-h-screen">
    <div class="p-6">
      <h1 class="text-xl font-bold text-gray-800 mb-1">Document Acknowledgment</h1>
      <p class="text-sm text-gray-500 mb-6">Manage and acknowledge received claim documents</p>

      <!-- Tabs -->
      <div class="flex gap-2 mb-6">
        <button class="px-4 py-2 text-xs font-medium rounded bg-teal-600 text-white">Fire and Engineering</button>
        <button
          class="px-4 py-2 text-xs font-medium rounded bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">Casualty</button>
        <button
          class="px-4 py-2 text-xs font-medium rounded bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">Marine/Hull/Travel</button>
      </div>

      <!-- Search Claim -->
      <div class="bg-white rounded-lg border border-gray-200 p-5 mb-6 shadow-sm">
        <h2 class="text-sm font-semibold text-gray-800 mb-4">Search Claim</h2>
        <div class="flex gap-4 items-end">
          <div class="flex-1">
            <label class="block text-xs font-medium text-gray-600 mb-1">Claim/Reference/Policy Number</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-3.5 w-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>
              <input type="text" placeholder="Enter Number"
                class="w-full pl-9 pr-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500" />
            </div>
          </div>
          <div class="flex-1">
            <label class="block text-xs font-medium text-gray-600 mb-1">Contact Number (Claim-Intimated)</label>
            <input type="text" placeholder="Enter Contact Number"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <button
            class="bg-teal-600 text-white text-xs font-medium px-8 py-2 rounded-md hover:bg-teal-700 transition-colors h-[34px]">Search</button>
        </div>
      </div>

      <!-- Claim Details -->
      <div class="bg-white rounded-lg border border-gray-200 p-5 mb-6 shadow-sm">
        <h2 class="text-sm font-semibold text-gray-800 mb-4">Claim Details</h2>
        <div class="grid grid-cols-3 gap-x-6 gap-y-4">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Policy Number</label>
            <input type="text" value="PCL-2024-001234"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Claim Number</label>
            <input type="text" value="CLM-2024-567890"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">REF Number</label>
            <input type="text" value="REF-2024-789012"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Date of Accident</label>
            <input type="text" value="March 15, 2024"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Branch Name</label>
            <input type="text" placeholder="Branch Name"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700 placeholder-gray-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Acknowledging User Name</label>
            <input type="text" value="Shannah"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Insured Name</label>
            <input type="text" value="ABC Manufacturing Ltd."
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700" />
          </div>
        </div>
      </div>

      <!-- Required Documents Checklist -->
      <div class="bg-white rounded-lg border border-gray-200 mb-6 shadow-sm">
        <div class="px-5 py-4 border-b border-gray-100">
          <h2 class="text-sm font-semibold text-gray-800">Required Documents Checklist</h2>
        </div>
        <table class="w-full text-xs">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="py-3 px-5 text-center font-medium text-gray-500 w-1/3">Document Name</th>
              <th class="py-3 px-5 text-center font-medium text-gray-500 w-1/3">Received Document</th>
              <th class="py-3 px-5 text-center font-medium text-gray-500 w-1/3">Send Document</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr class="hover:bg-gray-50">
              <td class="py-3 px-5 text-center text-gray-800 font-medium">Claim Form</td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle1" checked
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle1"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle2" checked
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle2"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
            </tr>
            <tr class="bg-gray-50 hover:bg-gray-100/50">
              <td class="py-3 px-5 text-center text-gray-800 font-medium">Police Report</td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle3"
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle3"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle4" checked
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle4"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
            </tr>
            <tr class="hover:bg-gray-50">
              <td class="py-3 px-5 text-center text-gray-800 font-medium">Fire Department Report</td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle5"
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle5"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle6" checked
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle6"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
            </tr>
            <tr class="bg-gray-50 hover:bg-gray-100/50">
              <td class="py-3 px-5 text-center text-gray-800 font-medium">Insurance Policy Copy</td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle7"
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle7"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle8" checked
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle8"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
            </tr>
            <tr class="hover:bg-gray-50">
              <td class="py-3 px-5 text-center text-gray-800 font-medium">Photographs of Damage</td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle9"
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle9"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle10"
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle10"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
            </tr>
            <tr class="bg-gray-50 hover:bg-gray-100/50">
              <td class="py-3 px-5 flex justify-center">
                <input type="text" placeholder="Other"
                  class="w-48 text-center px-3 py-1.5 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-500 placeholder-gray-400 bg-white" />
              </td>
              <td class="py-3 px-5 text-center">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle11"
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle11"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
              </td>
              <td class="py-3 px-5 flex items-center justify-center gap-10">
                <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
                  <input type="checkbox" name="toggle" id="toggle12"
                    class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10" />
                  <label for="toggle12"
                    class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
                <button
                  class="w-4 h-4 bg-teal-50 border border-teal-200 rounded flex items-center justify-center text-teal-600 hover:bg-teal-100">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                  </svg>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Actions -->
      <div class="bg-white rounded-lg border border-gray-200 p-5 shadow-sm mb-10">
        <h2 class="text-sm font-semibold text-gray-800 mb-4">Actions</h2>
        <div class="flex items-end justify-between">
          <div class="w-1/2 max-w-sm">
            <label class="block text-xs font-medium text-gray-600 mb-1">Customer Phone Number</label>
            <input type="text" value="077 123 4567"
              class="w-full px-3 py-2 text-xs border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-gray-700" />
          </div>
          <button
            class="bg-teal-600 text-white text-xs font-medium px-5 py-2.5 rounded-md hover:bg-teal-700 transition-colors shadow-sm">
            Print Acknowledgment & Send SMS
          </button>
        </div>
      </div>

    </div>
  </main>

  <script>
    renderSidebar('acknowledgment');
  </script>
</body>

</html>
